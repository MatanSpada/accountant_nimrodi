name: Deploy Placeholder

on:
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare types
        run: npm run cf-typegen

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # Required secrets before enabling real deployment:
      # - CLOUDFLARE_API_TOKEN
      # - CLOUDFLARE_ACCOUNT_ID
      # Recommended additional environment secrets in Cloudflare:
      # - ADMIN_PASSWORD
      # - SESSION_SECRET
      # - future GROW and invoice provider credentials
